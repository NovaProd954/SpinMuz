# ═══════════════════════════════════════════════════════════════════
#  SpinVault — Android APK Builder
#  Place this file at: .github/workflows/build-android.yml
# ═══════════════════════════════════════════════════════════════════
#
#  JOBS
#  ├── debug    → always runs; arm64-v8a only (fast ~10 min)
#  └── release  → runs on push to main/master (skipped on PRs)
#                 requires 4 GitHub Secrets (see RELEASE SECRETS section)
#
#  ARTIFACTS
#  Both APKs are uploaded as downloadable artifacts (Actions → your run).
#
# ─── RELEASE SECRETS ───────────────────────────────────────────────
#  Set these in: Settings → Secrets and variables → Actions → New secret
#
#  RELEASE_KEYSTORE_BASE64  — base64 of your .jks / .keystore file
#    Generate a new keystore:
#      keytool -genkey -v -keystore spinvault-release.jks \
#              -alias spinvault -keyalg RSA -keysize 2048 -validity 10000
#    Then encode it:
#      base64 -w 0 spinvault-release.jks   (Linux)
#      base64 spinvault-release.jks        (macOS)
#
#  RELEASE_STORE_PASSWORD   — keystore password (storePassword)
#  RELEASE_KEY_ALIAS        — key alias (keyAlias)
#  RELEASE_KEY_PASSWORD     — key password  (keyPassword)
# ═══════════════════════════════════════════════════════════════════

name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Which APK to build'
        required: false
        default: 'both'
        type: choice
        options: [debug, release, both]

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  NDK_VERSION: '25.1.8937393'
  BUILD_TOOLS: '34.0.0'
  COMPILE_SDK: '34'
  GRADLE_VERSION: '8.3'

jobs:
  # ──────────────────────────────────────────────────────────────────
  #  JOB 1 — Debug APK
  # ──────────────────────────────────────────────────────────────────
  debug:
    name: 🔧 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⬢ Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 npm ci
        run: npm ci

      - name: 🔧 Patch missing Babel plugin
        run: npm install --save-dev babel-plugin-module-resolver --legacy-peer-deps

      - name: ☕ Java ${{ env.JAVA_VERSION }} (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 🛠 Install NDK + build tools + platform
        run: |
          sdkmanager --install \
            "ndk;${{ env.NDK_VERSION }}" \
            "build-tools;${{ env.BUILD_TOOLS }}" \
            "platforms;android-${{ env.COMPILE_SDK }}" \
            --channel=0

      - name: 📌 Pin ANDROID_NDK_HOME
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: 🌀 Ensure Gradle wrapper
        run: |
          if [ ! -f android/gradlew ]; then
            echo "⚠️  gradlew not found — generating Gradle ${{ env.GRADLE_VERSION }} wrapper"
            cd android
            gradle wrapper \
              --gradle-version ${{ env.GRADLE_VERSION }} \
              --distribution-type bin
          fi
          chmod +x android/gradlew

      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 📄 Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT"     > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME"    >> android/local.properties

      - name: 🔑 Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: 🔨 Assemble debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --stacktrace

      - name: 📤 Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SpinVault-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error


  # ──────────────────────────────────────────────────────────────────
  #  JOB 2 — Release APK
  # ──────────────────────────────────────────────────────────────────
  release:
    name: 🚀 Release APK
    runs-on: ubuntu-latest

    if: |
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.build_type != 'debug')

    needs: debug

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⬢ Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 npm ci
        run: npm ci

      - name: 🔧 Patch missing Babel plugin
        run: npm install --save-dev babel-plugin-module-resolver --legacy-peer-deps

      - name: ☕ Java ${{ env.JAVA_VERSION }} (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 🛠 Install NDK + build tools + platform
        run: |
          sdkmanager --install \
            "ndk;${{ env.NDK_VERSION }}" \
            "build-tools;${{ env.BUILD_TOOLS }}" \
            "platforms;android-${{ env.COMPILE_SDK }}" \
            --channel=0

      - name: 📌 Pin ANDROID_NDK_HOME
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: 🌀 Ensure Gradle wrapper
        run: |
          if [ ! -f android/gradlew ]; then
            cd android
            gradle wrapper \
              --gradle-version ${{ env.GRADLE_VERSION }} \
              --distribution-type bin
          fi
          chmod +x android/gradlew

      - name: ⚡ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 📄 Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT"     > android/local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME"    >> android/local.properties

      - name: 🔑 Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release.keystore

      - name: 🔨 Assemble release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}" \
            --no-daemon \
            --stacktrace

      - name: 📤 Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: SpinVault-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error
