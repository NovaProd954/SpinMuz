name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate missing Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper
          # Downloads the standard wrapper script directly into the runner
          curl -o android/gradlew https://raw.githubusercontent.com/facebook/react-native/main/packages/react-native/template/android/gradlew
          curl -o android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/facebook/react-native/main/packages/react-native/template/android/gradle/wrapper/gradle-wrapper.jar
          
          # Match this to your project's Gradle needs (Gradle 8.8 is standard for modern RN)
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.8-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --no-build-cache \
            -Dfile.encoding=UTF-8

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpinVault-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
 
