workflows:
  android-debug:
    name: SpinMuz Android Debug
    max_build_duration: 30
    environment:
      node: 18
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Set up Gradle wrapper
        script: |
          mkdir -p android/gradle/wrapper
          curl -o android/gradlew \
            https://raw.githubusercontent.com/facebook/react-native/v0.73.4/packages/react-native/template/android/gradlew
          curl -o android/gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/facebook/react-native/v0.73.4/packages/react-native/template/android/gradle/wrapper/gradle-wrapper.jar
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          chmod +x android/gradlew
          echo "org.gradle.native=false" >> android/gradle.properties
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.native=false
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
